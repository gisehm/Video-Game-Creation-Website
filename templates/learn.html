{% extends "layout.html" %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center">

  <div class="card p-5 shadow-lg text-center" style="max-width: 700px; width:100%; border-radius:15px;">

    <h2 class="fw-bold">{{ lesson.title }}</h2>
    <p class="lead mt-3">{{ lesson.content }}</p>

    <div class="mt-4">
      <img src="{{ lesson.img1 }}"
      class="img-fluid rounded"> <br>
      {{lesson.p1}} <br><br>

      <img src="{{ lesson.img2 }}"
      class="img-fluid rounded"> <br>
      {{lesson.p2}} <br><br>

      <img src="{{ lesson.img3 }}"
      class="img-fluid rounded"> <br>
      {{lesson.p3}} <br><br>
    </div>

    <div class="mt-5 d-flex justify-content-between">
      {% if num > 1 %}
      <a href="/learn/{{ num-1 }}" class="btn btn-outline-secondary">← Back</a>
      {% else %}
      <span></span>
      {% endif %}

      <a href="/learn/{{ num+1 }}" class="btn btn-primary">Next →</a>
    </div>

  </div>

</div>
{% endblock %}
